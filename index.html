<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Patel Stores | Wholesale Ordering</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- LOGIN -->

<section id="login-screen" class="login-screen">

    <div class="login-card">

        <div class="brand-block login-brand">

            <div class="brand-badge">PS</div>

            <div>

                <p class="eyebrow">B2B Wholesale Portal</p>

                <h1>Patel Stores</h1>

                <p class="hero-subtitle">
                    Retailer Ordering Access
                </p>

            </div>

        </div>

        <form id="login-form" class="login-form">

            <label class="login-label">
                Mobile Number
            </label>

            <input
                id="login-mobile"
                type="tel"
                placeholder="Enter mobile number"
                required>

            <button class="login-btn" type="submit">
                Login
            </button>

            <p id="login-error" class="login-error"></p>

        </form>

    </div>

</section>


<!-- MAIN WEBSITE -->

<div id="app-shell" class="app-shell is-hidden">

<header class="hero">

    <div class="hero-top">

        <div class="logo-row">

            <div class="brand-badge">
                PS
            </div>

            <div>

                <h1 class="logo-title">
                    Patel Stores
                </h1>

            </div>

        </div>

        <div class="hero-actions">
            <button id="sync-status" class="sync-status" type="button" aria-expanded="false">● Online</button>
            <button
                id="menu-toggle"
                class="menu-toggle"
                type="button"
                aria-controls="menu-drawer"
                aria-expanded="false"
                aria-label="Open menu">

                ☰

            </button>
        </div>

    </div>


    <div id="sync-panel" class="sync-panel is-hidden">
        <div class="sync-panel-header">Sync Status</div>
        <div id="sync-summary" class="sync-summary">Checking sync state…</div>
        <div class="sync-actions">
            <button id="retry-sync" class="retry-sync" type="button">Retry Sync</button>
        </div>
    </div>

    <label class="search-shell">

        <span class="search-icon">⌕</span>

        <input
            id="search"
            type="text"
            placeholder="Search product, barcode...">

    </label>

</header>


<main class="main-content">

<section class="filter-panel">

<div class="filter-row">

<button class="filter-chip active" data-category="All">
All
</button>

<button class="filter-chip" data-category="Bucket">
Bucket
</button>

<button class="filter-chip" data-category="Cleaning">
Cleaning
</button>

<button class="filter-chip" data-category="Bottle">
Bottle
</button>

<button class="filter-chip" data-category="Jerry Can">
Jerry Can
</button>

<button class="filter-chip" data-category="Household">
Household
</button>

</div>

</section>


<section class="products-section">

<div class="section-header">

<div>

<h2>
Wholesale Products
</h2>

<p>
Bulk-ready essentials
</p>

</div>

<span
id="results-count"
class="results-pill">

Loading...

</span>

</div>

<div
id="products"
class="product-grid">

</div>

</section>

</main>


<button
id="cart-toggle"
class="cart-toggle"
type="button">

<span>🛒</span>

<span>Cart</span>

<span
id="cart-count"
class="cart-badge">

0

</span>

</button>



<div
id="drawer-overlay"
class="drawer-overlay">

</div>

<aside
id="menu-drawer"
class="menu-drawer"
aria-label="Sidebar menu">

<div class="drawer-header menu-header">

<div>
<h3>Menu</h3>
<p>Quick access</p>
</div>

<button
id="close-menu"
class="icon-btn"
type="button"
aria-label="Close menu">
×
</button>

</div>

<div class="menu-content">

<div id="menu-profile" class="menu-profile is-hidden">

<div id="welcome-pill" class="welcome-pill is-hidden">Welcome</div>
<div id="shop-name" class="menu-meta">Shop Name</div>
<div id="mobile-number" class="menu-meta">Mobile Number</div>
<button id="logout-btn" class="logout-btn is-hidden" type="button">Logout</button>

</div>

<div class="menu-section">
<h4>Categories</h4>
<div class="filter-row menu-filter-row">
<button class="filter-chip active" data-category="All">All</button>
<button class="filter-chip" data-category="Bucket">Bucket</button>
<button class="filter-chip" data-category="Cleaning">Cleaning</button>
<button class="filter-chip" data-category="Bottle">Bottle</button>
<button class="filter-chip" data-category="Jerry Can">Jerry Can</button>
<button class="filter-chip" data-category="Household">Household</button>
</div>
</div>

</div>

</aside>

<aside
id="cart-drawer"
class="cart-drawer">

<div class="drawer-header">

<div>

<h3>
Order Basket
</h3>

<p id="cart-total-items">
0 items
</p>

</div>

<button
id="close-cart"
class="icon-btn">

×

</button>

</div>


<div
id="cart-items"
class="cart-items">

</div>


<form
id="checkout-form"
class="checkout-form">

<h4>

Checkout

</h4>

<label>

Remarks

<textarea
id="customer-remarks"
name="remarks"
rows="3"
placeholder="Delivery instructions">

</textarea>

</label>


<input
type="hidden"
id="sheet-endpoint"
value="https://script.google.com/macros/s/AKfycbzXLQEuY6Vj0Ufs4gOmVJ0YoB4X4bN5XKkkxVjTU4rBP0a0ntrQQp2TLSRAERsqVDw/exec">


<button
class="submit-btn"
type="submit">

Place Order

</button>

</form>

</aside>

</div>


<div
id="toast"
class="toast">

</div>


<script src="script.js"></script>

</body>
</html>
